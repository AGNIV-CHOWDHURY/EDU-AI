services:
  - type: web
    name: eduai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # ⚠️  IMPORTANT: Set SECRET_KEY manually in Render dashboard to a long
      #    random string. Run once locally:
      #      python -c "import secrets; print(secrets.token_hex(32))"
      #    Then paste the output as the value below (sync: false = you set it in dashboard).
      #    DO NOT use generateValue: true — that regenerates on every deploy and
      #    invalidates all user sessions, forcing everyone to re-login.
      - key: SECRET_KEY
        sync: false
      # DATABASE_URL is automatically injected by Render when you link the
      # PostgreSQL database below using fromDatabase.  Do NOT set it manually.
      - key: DATABASE_URL
        fromDatabase:
          name: eduai-db
          property: connectionString
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        value: eduai-students
      - key: GEMINI_API_KEY
        sync: false
      - key: DAILY_API_KEY
        sync: false
      - key: FLASK_ENV
        value: production

databases:
  - name: eduai-db
    plan: free
